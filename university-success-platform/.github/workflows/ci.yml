name: CI Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linting & Formatting Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: Run Ruff Linter
        run: |
          ruff check .
      - name: Run Black Formatter Check
        run: |
          black --check .

  dbt-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        working-directory: pipelines/transformation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=200 --retries=15 \
            dbt-core==1.11.12 \
            dbt-duckdb==1.10.1
      # NOTE: profiles.yml.example currently points to ../../data/raw/university.duckdb
      # but every other reference in this repo (api/main.py, docker-compose.yml) uses
      # data/university.duckdb with no /raw/ subfolder. Using the confirmed path below.
      # TODO(Marouane): confirm which path is correct and update profiles.yml.example.
      - name: Generate dbt profiles.yml for CI
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          university_success:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: '${{ github.workspace }}/data/university.duckdb'
                schema: main
                threads: 4
          EOF
      - name: Run dbt debug (sanity check connection)
        run: dbt debug
      - name: Run dbt tests
        run: dbt test

  data-quality:
    runs-on: ubuntu-latest
    needs: code-quality
    # TODO(Imane): confirm actual working directory — script docstrings say
    # "data_quality/project/" but repo listing shows "data_quality/data_quality/".
    # Using the confirmed nested path from repo listing below.
    defaults:
      run:
        working-directory: data_quality/data_quality
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Great Expectations dependencies
        run: |
          python -m pip install --upgrade pip
          # TODO(Imane): no data_quality/requirements.txt found yet — installing
          # the packages the scripts import directly. Replace with
          # `pip install -r requirements.txt` once that file exists.
          pip install --default-timeout=200 --retries=15 \
            great-expectations \
            duckdb \
            pandas
      - name: Run raw layer validation
        run: python scripts/03_run_validation.py
      - name: Run marts layer validation
        run: python scripts/05_run_marts_validation.py --marts-dir ../../data/marts
      - name: Run staging layer validation
        run: python scripts/07_run_staging_validation.py
      - name: Upload data quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-reports
          path: |
            data_quality/data_quality/docs/data_quality_reports/
            data_quality/data_quality/quality_issues_log.csv

  api-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          # No api/requirements.txt exists yet — installing straight from
          # api/Dockerfile's package list. Replace with
          # `pip install -r requirements.txt` once Houssame adds one.
          pip install --default-timeout=200 --retries=15 \
            fastapi \
            uvicorn \
            scikit-learn \
            lightgbm \
            joblib \
            slowapi \
            jinja2 \
            duckdb \
            pandas \
            pydantic \
            pytest \
            pytest-mock \
            httpx
      - name: Check test file exists
        id: check_tests
        run: |
          if [ -f "test_main.py" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::api/test_main.py not found yet — skipping pytest step. Add tests before this becomes a merge gate."
          fi
      - name: Run pytest suite
        if: steps.check_tests.outputs.exists == 'true'
        run: pytest test_main.py -v