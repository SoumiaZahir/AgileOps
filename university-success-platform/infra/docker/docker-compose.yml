services:
  # =========================================================================
  # MLflow Tracking Server
  # =========================================================================
  # Serves as the central repository for logging parameters, code versions,
  # metrics, and output files (artifacts) generated when running ML experiments.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mlflow_tracking_server
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped


    # =========================================================================
  # FastAPI API Service (Houssame)
  # =========================================================================
  # Serves production models and exposes predictions endpoints to users.
  # Interacts with the shared DuckDB database file.
  trainnig_service:
    build:
      context: ../../ml
      dockerfile: Dockerfile
    container_name: trainnig_service
    environment:
      - DATABASE_PATH=/app/data/university.duckdb
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8888:8888"
    volumes:
      - ../../data:/app/data
      - ../../ml:/app
    restart: unless-stopped
    depends_on:
      - mlflow  

  # =========================================================================
  # FastAPI API Service (Houssame)
  # =========================================================================
  # Serves production models and exposes predictions endpoints to users.
  # Interacts with the shared DuckDB database file.
  api_service:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: api_service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/university.duckdb
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../../data:/app/data
      - ../../api:/app
    restart: unless-stopped
    depends_on:
      - mlflow

  # Add this block right below api_service
  api_test:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: api_test_runner
    environment:
      - DATABASE_PATH=/app/data/university.duckdb
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../../data:/app/data
      - ../../api:/app
    # Installs the test dependencies inline and triggers pytest inside /app
    command: >
      sh -c "pip install --no-cache-dir pytest pytest-mock httpx && pytest /app/test_main.py -v"    

  # =========================================================================
  # Dagster Workspace (User Code Location gRPC Service)
  # =========================================================================
  # Containerizes the team's custom pipelines, models, and dependencies,
  # exposing them to the webserver and daemon over a stable gRPC interface.
  dagster_workspace:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: dagster_workspace
    expose:
      - "4000"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - ../../data:/opt/dagster/app/data
      - ../../pipelines:/opt/dagster/app/pipelines
      - ../../ml:/opt/dagster/app/ml
    restart: unless-stopped

  # =========================================================================
  # Dagster Webserver
  # =========================================================================
  # The web-based UI for exploring assets, launching jobs, and viewing history.
  dagster_webserver:
      build:
        context: ../../
        dockerfile: infra/docker/Dockerfile   # نفسها لي كتبني dagster_workspace
      container_name: dagster_webserver
      command: dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/dagster_home/workspace.yaml
      ports:
        - "3000:3000"
      environment:
        - DAGSTER_HOME=/opt/dagster/dagster_home
      volumes:
        - dagster_home:/opt/dagster/dagster_home
        - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
        - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
        - ../../data:/opt/dagster/app/data
      restart: unless-stopped
      depends_on:
        - mlflow
        - dagster_workspace

    # =========================================================================
  # Dagster Daemon
  # =========================================================================
  dagster_daemon:
      build:
        context: ../../
        dockerfile: infra/docker/Dockerfile
      container_name: dagster_daemon
      command: dagster-daemon run -w /opt/dagster/dagster_home/workspace.yaml
      environment:
        - DAGSTER_HOME=/opt/dagster/dagster_home
      volumes:
        - dagster_home:/opt/dagster/dagster_home
        - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
        - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
        - ../../data:/opt/dagster/app/data
      restart: unless-stopped
      depends_on:
        - dagster_webserver
        - dagster_workspace

volumes:
  mlflow_data:
    name: mlflow_data
  dagster_home:
    name: dagster_home
